# Songer app — nginx reverse proxy config
#
# HOW TO USE:
#   This is a location block to add inside your existing server {} block for h.eino.us.
#
#   1. On the VPS, open your nginx config for h.eino.us:
#      sudo nano /etc/nginx/sites-available/h.eino.us   (or wherever it lives)
#
#   2. Inside the existing `server { ... }` block, add the location block below.
#
#   3. Test and reload:
#      sudo nginx -t && sudo systemctl reload nginx
#
#   4. If HTTPS is not yet configured for h.eino.us, run first:
#      sudo certbot --nginx -d h.eino.us
#
# NOTE: This assumes the Express server is running on port 3000 via PM2.

location /theyellow/songer/ {
    # CRITICAL: The trailing slash on proxy_pass strips the /theyellow/songer/ prefix
    # so Express receives clean paths like /api/submissions (not /theyellow/songer/api/submissions)
    proxy_pass http://127.0.0.1:3000/;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # HTTP/1.1 for keep-alive and WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
